<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>document.documentElement.classList.add('js');</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0d0d0d">
  <meta name="author" content="Madan Kumar PC">
  <meta name="description" content="Blog by Madan Kumar PC — thoughts on Cambridge Education, Career Counselling, AI, and EdTech.">
  <link rel="canonical" href="https://pcmadankumar.github.io/blog/">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Madan Kumar PC">
  <meta property="og:title" content="Blog | Madan Kumar PC">
  <meta property="og:description" content="Thoughts on Cambridge Education, Career Counselling, AI, and EdTech.">
  <meta property="og:url" content="https://pcmadankumar.github.io/blog/">
  <meta property="og:image" content="https://pcmadankumar.github.io/assets/og-image.jpg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Blog | Madan Kumar PC">
  <meta name="twitter:description" content="Thoughts on Cambridge Education, Career Counselling, AI, and EdTech.">
  <title>Blog | Madan Kumar PC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/blog.css">
  <link rel="stylesheet" href="../css/icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <a href="#main-content" class="skip-link">Skip to main content</a>

  <!-- Navigation -->
  <nav class="nav" role="navigation" aria-label="Main navigation"></nav>

  <main class="page-content" id="main-content">
    <section class="section">
      <div class="container">

        <div class="section-header fade-up">
          <h1 class="section-title">Blog</h1>
          <p class="section-subtitle">Thoughts on Education &nbsp;·&nbsp; Career Counselling &nbsp;·&nbsp; AI &amp; EdTech</p>
        </div>

        <!-- Search & Tag Filters -->
        <div class="blog-controls fade-up">
          <div class="blog-search-wrap">
            <i class="fa-solid fa-magnifying-glass blog-search-icon"></i>
            <input
              type="search"
              id="blog-search"
              class="blog-search"
              placeholder="Search posts by title, topic, or tag…"
              autocomplete="off"
              aria-label="Search blog posts"
            >
          </div>
          <div id="tag-filters" class="blog-tag-filters"></div>
        </div>

        <!-- Result count -->
        <p id="blog-result-count" class="blog-result-count"></p>

        <!-- Cards grid (populated by blog.js) -->
        <div id="blog-grid" class="blog-grid" aria-live="polite">
          <div class="blog-empty">
            <i class="fa-solid fa-spinner fa-spin"></i>
            <p>Loading posts…</p>
          </div>
        </div>

        <!-- Pagination (populated by blog.js) -->
        <nav id="blog-pagination" class="blog-pagination" aria-label="Blog pagination"></nav>

      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-inner footer-inner--split">
      <div style="display: flex; flex-direction: column; gap: 6px; align-items: flex-start;">
        <p class="footer-text">
          &copy; 2026 Madan Kumar PC
          <span class="dot">·</span>
          Proudly built with Claude &amp; GitHub ❤️
        </p>
        <a href="https://www.linkedin.com/in/madankumarpc" target="_blank" rel="noopener" class="footer-link">
          <i class="fa-brands fa-linkedin"></i> Connect on LinkedIn
        </a>
      </div>
      <p class="footer-quote">
        <span class="footer-quote-text"></span>
        <span class="footer-quote-author"></span>
      </p>
    </div>
  </footer>

  <script src="../js/nav.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/blog.js"></script>
<script data-goatcounter="https://pcmadankumar.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</body>
</html>
