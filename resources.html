<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0d0d0d">
  <meta name="author" content="Madan Kumar PC">
  <meta name="description" content="Teaching resources and study materials by Madan Kumar PC — curated Cambridge curriculum aids available for purchase.">
  <link rel="canonical" href="https://pcmadankumar.github.io/resources.html">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Madan Kumar PC">
  <meta property="og:title" content="Resources &amp; Study Materials | Madan Kumar PC">
  <meta property="og:description" content="Curated teaching resources and study materials for Cambridge subjects — available on Gumroad.">
  <meta property="og:url" content="https://pcmadankumar.github.io/resources.html">
  <meta property="og:image" content="https://pcmadankumar.github.io/assets/og-image.jpg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Resources &amp; Study Materials | Madan Kumar PC">
  <meta name="twitter:description" content="Curated teaching resources and study materials for Cambridge subjects — available on Gumroad.">
  <title>Resources &amp; Study Materials | Madan Kumar PC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <a href="#main-content" class="skip-link">Skip to main content</a>

  <!-- Navigation -->
  <nav class="nav" role="navigation" aria-label="Main navigation"></nav>

  <main class="page-content" id="main-content">

    <!-- Page Hero -->
    <section class="page-hero">
      <div class="container">
        <h1 class="page-hero-title fade-up">Resources &amp; <span>Study Materials</span></h1>
        <p class="page-hero-sub fade-up">Curated teaching aids for Cambridge subjects — ready to use in class, available on Gumroad.</p>
      </div>
    </section>

    <!-- Resources Grid -->
    <section class="section">
      <div class="container">
        <div id="res-root" aria-live="polite">
          <div class="res-loading">
            <i class="fa-solid fa-spinner fa-spin"></i>
            <p>Loading resources&hellip;</p>
          </div>
        </div>
      </div>
    </section>

  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-inner footer-inner--split">
      <div style="display: flex; flex-direction: column; gap: 6px; align-items: flex-start;">
        <p class="footer-text">
          &copy; 2026 Madan Kumar PC
          <span class="dot">&middot;</span>
          Proudly built with Claude &amp; GitHub ❤️
        </p>
        <a href="https://www.linkedin.com/in/madankumarpc" target="_blank" rel="noopener" class="footer-link">
          <i class="fa-brands fa-linkedin"></i> Connect on LinkedIn
        </a>
      </div>
      <p class="footer-quote">
        <span class="footer-quote-text"></span>
        <span class="footer-quote-author"></span>
      </p>
    </div>
  </footer>

  <script src="js/nav.js"></script>
  <script src="js/main.js"></script>
  <script>
  (function() {
    var root = document.getElementById('res-root');
    if (!root) return;

    function esc(s) { return String(s == null ? '' : s).replace(/"/g, '&quot;'); }
    function tagsHtml(r) {
      return (r.tags || []).map(function(t) { return '<span class="res-tag">' + t + '</span>'; }).join('');
    }

    // "My Resources" card — solid gold "Get it now" → Gumroad
    function mineCard(r) {
      var formats = (r.formats || []).map(function(f) {
        return '<span class="res-format-badge">' + f + '</span>';
      }).join('');
      var thumb = r.cover
        ? '<img class="res-thumb" src="' + r.cover + '" alt="' + esc(r.title) + '" loading="lazy">'
        : '<div class="res-thumb-placeholder"><i class="fa-solid fa-book-open"></i></div>';
      var bestFor = r.bestFor
        ? '<p class="res-bestfor"><span>Best for:</span> ' + r.bestFor + '</p>'
        : '';
      return '<article class="res-card fade-up">' +
        thumb +
        '<div class="res-body">' +
          '<div class="res-formats">' + formats + '</div>' +
          '<h3 class="res-title">' + r.title + '</h3>' +
          bestFor +
          '<p class="res-desc">' + r.description + '</p>' +
          '<div class="res-tags">' + tagsHtml(r) + '</div>' +
        '</div>' +
        '<div class="res-footer">' +
          '<a href="' + r.url + '" target="_blank" rel="noopener noreferrer" class="res-btn">' +
            '<i class="fa-solid fa-bag-shopping"></i> Get it now' +
          '</a>' +
        '</div>' +
      '</article>';
    }

    // "Worth Your Time" card — others' work, attribution + thanks, outline "Visit resource"
    function recCard(r) {
      var thumb = r.cover
        ? '<img class="res-thumb" src="' + r.cover + '" alt="' + esc(r.title) + '" loading="lazy">'
        : '<div class="res-thumb-placeholder"><i class="fa-solid fa-bookmark"></i></div>';
      var attr = r.author
        ? '<p class="res-attribution"><i class="fa-solid fa-user-pen"></i> by ' + r.author +
            (r.source ? ' &middot; <span>' + r.source + '</span>' : '') + '</p>'
        : '';
      var thanks = r.thanks ? '<p class="res-thanks">' + r.thanks + '</p>' : '';
      return '<article class="res-card res-card--rec fade-up">' +
        '<span class="res-rec-label"><i class="fa-solid fa-heart"></i> Recommended</span>' +
        thumb +
        '<div class="res-body">' +
          attr +
          '<h3 class="res-title">' + r.title + '</h3>' +
          '<p class="res-desc">' + r.description + '</p>' +
          thanks +
          '<div class="res-tags">' + tagsHtml(r) + '</div>' +
        '</div>' +
        '<div class="res-footer">' +
          '<a href="' + r.url + '" target="_blank" rel="noopener noreferrer" class="res-btn res-btn--visit">' +
            '<i class="fa-solid fa-arrow-up-right-from-square"></i> Visit resource' +
          '</a>' +
        '</div>' +
      '</article>';
    }

    function sectionBlock(title, intro, cardsHtml) {
      return '<section class="res-section">' +
        '<h2 class="res-section-title">' + title + '</h2>' +
        '<p class="res-section-intro">' + intro + '</p>' +
        '<div class="res-grid">' + cardsHtml + '</div>' +
      '</section>';
    }

    fetch('resources.json')
      .then(function(r) { return r.json(); })
      .then(function(resources) {
        var mine = resources.filter(function(r) { return (r.type || 'mine') === 'mine'; });
        var rec  = resources.filter(function(r) { return r.type === 'recommended'; });

        if (!mine.length && !rec.length) {
          root.innerHTML = '<p class="res-empty">No resources available yet — check back soon!</p>';
          return;
        }

        var html = '';
        if (mine.length) {
          html += sectionBlock(
            'My <span>Resources</span>',
            'Teaching aids I’ve built for Cambridge subjects — ready to use in class, available on Gumroad.',
            mine.map(mineCard).join('')
          );
        }
        if (rec.length) {
          html += sectionBlock(
            'Worth Your <span>Time</span>',
            'Resources created by others that I genuinely rate — full credit to their authors. Every link goes to the original source.',
            rec.map(recCard).join('')
          );
        }
        root.innerHTML = html;

        root.querySelectorAll('.fade-up').forEach(function(el, i) {
          el.style.transitionDelay = (i * 80) + 'ms';
          setTimeout(function() { el.classList.add('visible'); }, 20);
        });
      })
      .catch(function() {
        root.innerHTML = '<p class="res-empty">Unable to load resources. Please try again later.</p>';
      });
  })();
  </script>
  <script data-goatcounter="https://pcmadankumar.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</body>
</html>
